<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>

  <title>NetApp ONTAP Cheatsheet | CLI Commands Quick Reference | NetApp Hub</title>
  <link rel="canonical" href="https://vadiraj.dev/cheatsheet.html">
  <meta name="description" content="NetApp ONTAP cheat sheet with common CLI commands for storage engineers, including volume, aggregate, SVM, network, snapshot, and troubleshooting commands.">
  <meta name="keywords" content="NetApp ONTAP cheat sheet, NetApp commands, ONTAP CLI, storage commands, NetApp automation">
  <meta name="author" content="Vadiraj">
  <meta name="robots" content="index, follow">

  <meta property="og:title" content="NetApp ONTAP CheatSheet | NetApp Hub">
  <meta property="og:description" content="Quick reference for common NetApp ONTAP CLI commands.">
  <meta property="og:url" content="https://vadiraj.dev/netapp-cheatsheet.html">
  <meta property="og:type" content="website">

  <meta name="twitter:card" content="summary">
  <meta name="twitter:title" content="NetApp ONTAP Cheat Sheet | NetApp Hub">
  <meta name="twitter:description" content="Quick reference for common NetApp ONTAP CLI commands.">

  <link rel="icon" href="/favicon.ico">
  <link rel="stylesheet" href="assets/css/style.css"/>
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600;700&family=Syne:wght@400;600;700;800&display=swap" rel="stylesheet"/>

</head>
<body>
  <div class="noise"></div>
   
  <!-- Sidebar -->
  <button class="sidebar-toggle" onclick="toggleSidebar()">☰</button>

  <main class="main-content">
    <header class="page-header">
      <div class="header-badge">QUICK REF</div>
      <h1 class="page-title">NetApp ONTAP Cheatsheet</h1>
      <p class="page-subtitle">Common CLI commands for daily storage administration, troubleshooting, and automation workflows.</p>
    </header>

    <section class="content-section">
      <div class="cmd-filter-bar">
        <input type="text" id="cheatFilter" placeholder="Filter commands..." />
        <select id="cheatCategory">
          <option value="all">All Categories</option>
        </select>
        <span class="result-count" id="cheatResultCount">0 commands</span>
      </div>
    
      <div class="cheat-grid" id="cheatGrid"></div>
    </section>
    
    <div id="footer-container"></div>
  </main>

  <script src="assets/js/sidebar-loader.js"></script>
  <script src="assets/js/utils.js"></script>
  <script src="assets/data/commands-data.js"></script>
  <script src="assets/js/search.js"></script>

  <script>
    function buildCheatSheetCategories(commands) {
      const cheatCategory = document.getElementById('cheatCategory');
      if (!cheatCategory) return;
  
      const categories = [...new Map(
        commands.map(cmd => [cmd.tag, cmd.tag])
      ).keys()].sort();
  
      cheatCategory.innerHTML = '<option value="all">All Categories</option>';
  
      categories.forEach(tag => {
        const option = document.createElement('option');
        option.value = tag;
        option.textContent = tag;
        cheatCategory.appendChild(option);
      });
    }
  
    function renderCheatSheet(commands) {
      const cheatGrid = document.getElementById('cheatGrid');
      const cheatResultCount = document.getElementById('cheatResultCount');
      const cheatFilter = document.getElementById('cheatFilter');
      const cheatCategory = document.getElementById('cheatCategory');
  
      if (!cheatGrid || !cheatResultCount) return;
  
      const filterValue = (cheatFilter?.value || '').toLowerCase().trim();
      const selectedCategory = cheatCategory?.value || 'all';
  
      const filtered = commands.filter(cmd => {
        const matchesText = `${cmd.name} ${cmd.description} ${cmd.tag} ${cmd.category}`
          .toLowerCase()
          .includes(filterValue);
  
        const matchesCategory =
          selectedCategory === 'all' || cmd.tag === selectedCategory;
  
        return matchesText && matchesCategory;
      });
  
      cheatResultCount.textContent = `${filtered.length} command${filtered.length !== 1 ? 's' : ''}`;
  
      const grouped = {};
      filtered.forEach(cmd => {
        if (!grouped[cmd.tag]) grouped[cmd.tag] = [];
        grouped[cmd.tag].push(cmd);
      });
  
      let html = '';
  
      Object.keys(grouped).sort().forEach(groupName => {
        html += `
          <div class="cheat-card">
            <h3>${groupName}</h3>
            ${grouped[groupName].map(cmd => `
              <div class="cmd-item">
                <code class="cmd-code">${cmd.name}</code>
                <div class="cmd-desc">${cmd.description}</div>
              </div>
            `).join('')}
          </div>
        `;
      });
  
      cheatGrid.innerHTML = html || '<p style="color: var(--text-dim);">No commands found for the current filter.</p>';
    }
  
    document.addEventListener('DOMContentLoaded', () => {
      try {
        if (!window.COMMANDS_DATA || !Array.isArray(window.COMMANDS_DATA.commands)) {
          throw new Error('COMMANDS_DATA not loaded');
        }
  
        const commands = [...window.COMMANDS_DATA.commands].sort((a, b) => {
          if (a.tag !== b.tag) return a.tag.localeCompare(b.tag);
          return a.name.localeCompare(b.name);
        });
  
        buildCheatSheetCategories(commands);
        renderCheatSheet(commands);
  
        const cheatFilter = document.getElementById('cheatFilter');
        const cheatCategory = document.getElementById('cheatCategory');
  
        if (cheatFilter) {
          cheatFilter.addEventListener('input', () => renderCheatSheet(commands));
        }
  
        if (cheatCategory) {
          cheatCategory.addEventListener('change', () => renderCheatSheet(commands));
        }
      } catch (error) {
        console.error('Failed to load cheat sheet:', error);
        const cheatGrid = document.getElementById('cheatGrid');
        if (cheatGrid) {
          cheatGrid.innerHTML = '<p style="color:red;">Failed to load cheat sheet.</p>';
        }
      }
    });
  </script>
</body>
</html>
