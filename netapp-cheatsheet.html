    const contentEl = document.getElementById('cheatSheetContent');
    const searchEl = document.getElementById('commandSearch');
    const filterEl = document.getElementById('categoryFilter');
    const countEl = document.getElementById('cheatCount');
    const noResultsEl = document.getElementById('noResults');

    function escapeHtml(text) {
      return text
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;');
    }

    function highlightText(text, query) {
      if (!query) return escapeHtml(text);
      const escaped = escapeHtml(text);
      const safeQuery = query.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
      return escaped.replace(new RegExp(`(${safeQuery})`, 'ig'), '<mark>$1</mark>');
    }

    function populateCategories() {
      const categories = [...new Set(commandData.map(item => item.category))].sort();
      categories.forEach(category => {
        const option = document.createElement('option');
        option.value = category;
        option.textContent = category;
        filterEl.appendChild(option);
      });
    }

    function filteredCommands() {
      const query = searchEl.value.trim().toLowerCase();
      const category = filterEl.value;

      return commandData.filter(item => {
        const matchesCategory = category === 'all' || item.category === category;
        const haystack = `${item.category} ${item.command} ${item.description}`.toLowerCase();
        const matchesQuery = !query || haystack.includes(query);
        return matchesCategory && matchesQuery;
      });
    }

    function renderCheatSheet() {
      const query = searchEl.value.trim();
      const filtered = filteredCommands();

      countEl.textContent = `${filtered.length} command${filtered.length === 1 ? '' : 's'}`;

      contentEl.innerHTML = '';
      noResultsEl.style.display = filtered.length ? 'none' : 'block';

      const grouped = filtered.reduce((acc, item) => {
        if (!acc[item.category]) acc[item.category] = [];
        acc[item.category].push(item);
        return acc;
      }, {});

      Object.keys(grouped).sort().forEach(category => {
        const card = document.createElement('div');
        card.className = 'cheat-card';

        const commandsHtml = grouped[category].map(item => `
          <div class="cmd-item">
            <div class="cmd-row">
              <code class="cmd-code">${highlightText(item.command, query)}</code>
              <button class="copy-command-btn" data-command="${encodeURIComponent(item.command)}" title="Copy command">Copy</button>
            </div>
            <span class="cmd-desc">${highlightText(item.description, query)}</span>
          </div>
        `).join('');

        card.innerHTML = `
          <h3>
            <span>${category}</span>
            <span class="card-count">${grouped[category].length}</span>
          </h3>
          ${commandsHtml}
        `;

        contentEl.appendChild(card);
      });

      bindCopyButtons();
    }

    function bindCopyButtons() {
      document.querySelectorAll('.copy-command-btn').forEach(btn => {
        btn.addEventListener('click', async () => {
          const command = decodeURIComponent(btn.dataset.command);
          try {
            await navigator.clipboard.writeText(command);
            const oldText = btn.textContent;
            btn.textContent = 'Copied';
            setTimeout(() => btn.textContent = oldText, 1200);
          } catch {
            btn.textContent = 'Failed';
            setTimeout(() => btn.textContent = 'Copy', 1200);
          }
        });
      });
    }

    searchEl.addEventListener('input', renderCheatSheet);
    filterEl.addEventListener('change', renderCheatSheet);

    document.addEventListener('DOMContentLoaded', () => {
      populateCategories();
      renderCheatSheet();
    });
  </script>
