<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>NetApp Hub</title>
    <script>
      // GitHub Pages SPA redirect — encodes the path into a query param
      // so index.html can restore it via history.replaceState.
      // pathSegmentsToKeep = 0 because vadiraj.dev is at the root (custom domain).
      var l = window.location;
      l.replace(
        l.protocol + '//' + l.hostname + (l.port ? ':' + l.port : '') +
        '/?/' +
        l.pathname.slice(1).replace(/&/g, '~and~') +
        (l.search ? '&' + l.search.slice(1).replace(/&/g, '~and~') : '') +
        l.hash
      );
    </script>
  </head>
  <body></body>
</html>
